name: Process Recurring Payments

on:
  schedule:
    # Run daily at 06:00 UTC (09:00 MSK)
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  process-payments:
    name: Process Recurring Payments
    runs-on: ubuntu-latest
    steps:
      - name: Invoke Edge Function
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${SUPABASE_URL}/functions/v1/process-recurring-payments" \
            -H "Content-Type: application/json" \
            -H "x-cron-key: ${CRON_SECRET}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Edge Function returned HTTP $HTTP_CODE"
            exit 1
          fi

          echo "summary=$BODY" >> $GITHUB_OUTPUT

  notify:
    name: Send Notification on Failure
    runs-on: ubuntu-latest
    needs: [process-payments]
    if: failure()
    steps:
      - name: Send Telegram alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MESSAGE="⚠️ *Symancy Cron*%0A%0A❌ process-recurring-payments FAILED%0A%0A🔗 [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "parse_mode=Markdown" \
            -d "disable_web_page_preview=true" \
            -d "text=${MESSAGE}"
